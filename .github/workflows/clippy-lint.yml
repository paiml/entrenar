name: Clippy Lint & Sovereignty Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings
      - name: Sovereignty linting (custom_lints)
        run: |
          # Verify no Python/JS/Lua in src/
          test $(find src/ -name '*.py' -o -name '*.js' -o -name '*.lua' | wc -l) -eq 0
          # Verify no std::env::set_var usage
          ! grep -r 'std::env::set_var' src/ --include='*.rs'
          # Verify clippy.toml config exists
          test -f clippy.toml || test -f .clippy.toml
      - name: Quality metrics (pmat)
        run: |
          # Run pmat quality check if available
          command -v pmat && pmat query --coverage-gaps --limit 5 --exclude-tests || true
