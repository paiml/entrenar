# Per-repo CI workflow — merge gate via clean-room verification
# Generated by machines/clean-room/deploy-workflows.sh — do not edit manually.
# Spec: docs/specifications/sovereign-stack-protected-branch-strategy.md
#
# Calls the centralized reusable gate workflow in paiml/infra.
# Branch protection requires "clean-room / gate" to pass before merge.

name: CI

on:
  pull_request_target:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:  # manual trigger for testing

# One CI run per branch/PR; cancel stale runs on same branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clean-room:
    uses: paiml/infra/.github/workflows/clean-room-gate.yml@main
    with:
      repo: ${{ github.event.repository.name }}
      pr_sha: ${{ github.event.pull_request.head.sha || github.ref }}
    secrets: inherit

  clippy:
    name: Clippy CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (sovereignty linting)
        run: cargo clippy --all-targets -- -D warnings
      - name: Custom sovereignty lints
        run: |
          # Verify zero scripting in src/
          test $(find src/ -name '*.py' -o -name '*.js' -o -name '*.lua' | wc -l) -eq 0
          # Verify no unsafe env mutations
          ! grep -r 'std::env::set_var' src/ --include='*.rs' || true

  miri:
    name: Miri UB Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: miri
        run: cargo +nightly miri test --lib -- numerical 2>/dev/null || true

  bench:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench
        run: cargo bench --no-run || true

  memory:
    name: Memory Footprint Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: memory footprint check
        run: |
          ulimit -v 4194304 || true
          cargo build --release 2>/dev/null || true
          test $(stat --format=%s target/release/libentrenar.rlib 2>/dev/null || echo 0) -lt 52428800 || true

  license:
    name: License Compliance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo deny check licenses
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check licenses 2>/dev/null || true
